command: ["uvicorn", "apx_deepagent_chat.backend.app:app", "--workers", "1"]

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  - name: APX_DEEPAGENT_CHAT_JOB_STORE_BACKEND
    value: "sqlite"
  - name: APX_DEEPAGENT_CHAT_JOB_STORE_DB_PATH
    value: "/tmp/apx_jobs.db"
