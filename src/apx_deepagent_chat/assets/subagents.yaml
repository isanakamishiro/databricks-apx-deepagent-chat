# Subagent definitions
# These are loaded by agent.py and wired up with tools

web_researcher:
  description: >
    Searches the web for a specific topic, saves findings to a file, and returns the file path.
    Give it a focused research goal — not an open-ended investigation.
    Examples: 'Search for global EV sales trends and key statistics for 2024-2025',
    'Find the latest pricing and features of competitor X's products'.
  model: databricks-gpt-oss-120b
  system_prompt: |
    Follow the `web-researcher` skill instructions exactly.
    Specifically, read and follow the "Subagent Execution Instructions" section step by step.
  skills:
    - /preset/skills/web-researcher/
  tools:
    - web_search
    - web_fetch
    - get_current_time

final_report_creator:
  description: >
    Takes a draft report file path, reads the content, and produces a polished,
    well-designed HTML final report. Returns the path to the saved HTML file.
    Use when you have a draft report and need a presentation-ready HTML document.
    Optionally accepts a `nuance` parameter to control the tone and atmosphere of the report
    (e.g. "明るくポジティブな雰囲気", "フォーマルで落ち着いたトーン", "カジュアルで読みやすいスタイル").
  model: databricks-gpt-oss-120b
  system_prompt: |
    Follow the `final-report-creator` skill instructions exactly.
    Specifically, read and follow the "Subagent Execution Instructions" section step by step.
  skills:
    - /preset/skills/final-report-creator/
  tools:
    - get_current_time
