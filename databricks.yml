bundle:
  name: apx-deepagent-chat

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

variables:
  experiment_id:
    description: "MLflow experiment ID for apx-deepagent-chat"
  volume_full_name:
    description: "Full securable name of the Databricks UC volume to use for apx-deepagent-chat (e.g. workspace.default.test)"

# 環境変数BUNDLE_VAR_experiment_idとBUNDLE_VAR_volume_full_nameを事前に定義しておくこと
resources:
  apps:
    apx-deepagent-chat-app:
      name: "apx-deepagent-chat"
      description: "apx-deepagent-chat created with apx"
      source_code_path: ./.build
      resources:
        - name: "experiment"
          description: "MLflow experiment for apx-deepagent-chat"
          experiment:
            experiment_id: ${var.experiment_id}
            permission: "CAN_EDIT"
        - name: "volume"
          description: "UC Volume for apx-deepagent-chat"
          uc_securable:
            securable_full_name: ${var.volume_full_name}
            securable_type: "VOLUME"
            permission: "WRITE_VOLUME"

targets:
  dev:
    mode: development
    default: true
