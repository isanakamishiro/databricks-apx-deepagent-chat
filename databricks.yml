bundle:
  name: apx-deepagent-chat

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

variables:
  experiment_id:
    description: "MLflow experiment ID for apx-deepagent-chat"
  mlflow_tracking_volume_full_name:
    description: "Full securable name of the Databricks UC volume to use for mlflow tracking (e.g. workspace.default.mlflow-tracking)"

# 環境変数BUNDLE_VAR_experiment_idとBUNDLE_VAR_volume_full_nameを事前に定義しておくこと
resources:
  apps:
    apx-deepagent-chat-app:
      name: "apx-deepagent-chat"
      description: "apx-deepagent-chat created with apx"
      source_code_path: ./.build
      user_api_scopes:
        - files.files
        - serving.serving-endpoints
        - catalog.connections
        - catalog.catalogs:read
        - catalog.schemas:read
        - sql
      resources:
        - name: "experiment"
          description: "MLflow experiment for apx-deepagent-chat"
          experiment:
            experiment_id: ${var.experiment_id}
            permission: "CAN_EDIT"
        - name: "mlflow-tracking-volume"
          description: "UC Volume for mlflow tracing"
          uc_securable:
            securable_full_name: ${var.mlflow_tracking_volume_full_name}
            securable_type: "VOLUME"
            permission: "WRITE_VOLUME"

targets:
  dev:
    mode: development
    default: true
